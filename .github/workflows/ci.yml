name: "CI/CD"

on:
  push:
  pull_request:
    branches: [develop, master]
  workflow_dispatch:
    inputs:
      RUN_CD:
        description: "Run CD stage"
        required: false
        type: boolean
        default: false
      ENABLE_REGISTRY_PUSH:
        description: "Push image to registry"
        required: false
        type: boolean
        default: false

env:
  IMAGE_REPO: 'ccoronal/devops-training-python-app'
  REGISTRY_HOST: 'local-registry:5000'
  REGISTRY_REPO: 'ccoronal/devops-training-python-app'
  ARTIFACTORY_URL: 'http://artifactory:8081/artifactory'
  ARTIFACTORY_REPO: libs-release-local
  COMPOSE_FILE: docker-compose.yml
  COMPOSE_SERVICE: app

jobs:
  ci:
    environment: ${{ github.ref_name == 'master' && 'PRO' || 'DEV' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: |
          echo "IMAGE_VERSION=$(cat VERSION)" >> $GITHUB_ENV
          echo "IMAGE_NAME=${IMAGE_REPO}:$(cat VERSION)" >> $GITHUB_ENV
          echo "CI_IMAGE=python-ci-tools:${GITHUB_RUN_ID}" >> $GITHUB_ENV
          echo "REGISTRY_IMAGE=${REGISTRY_HOST}/${REGISTRY_REPO}:$(cat VERSION)" >> $GITHUB_ENV

      - name: Build CI image
        run: docker build -t "${CI_IMAGE}" -f devops/ci.Dockerfile .

      - name: CI - Lint
        run: |
          docker run --rm -v "${GITHUB_WORKSPACE}:/app" -w /app "${CI_IMAGE}" sh -lc \
            "pip install -r requirements.txt && pip make lint"

      - name: CI - Test
        run: |
          docker run --rm -v "${GITHUB_WORKSPACE}:/app" -w /app "${CI_IMAGE}" sh -lc \
            "pip install -r requirements.txt && pytest -q"

      - name: CI - Build image
        run: docker build -t "${IMAGE_NAME}" -f devops/Dockerfile .

  cd:
    needs: ci
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.RUN_CD == true || github.ref_name == 'develop' || github.ref_name == 'master' }}
    environment: ${{ github.ref_name == 'master' && 'PRO' || 'DEV' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set deploy vars
        run: |
          echo "IMAGE_VERSION=$(cat VERSION)" >> $GITHUB_ENV
          echo "IMAGE_NAME=${IMAGE_REPO}:$(cat VERSION)" >> $GITHUB_ENV
          if [ "${GITHUB_REF_NAME}" = "master" ]; then DEPLOY_ENV=PRO; else DEPLOY_ENV=DEV; fi
          echo "DEPLOY_ENV=${DEPLOY_ENV}" >> $GITHUB_ENV
          echo "COMPOSE_PROJECT=$(echo ${DEPLOY_ENV} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build app image
        run: docker build -t "${IMAGE_NAME}" -f devops/Dockerfile .

      - name: CD - Compose up
        run: |
          docker compose -p "${COMPOSE_PROJECT}" up -d
          sleep 5
          docker compose -p "${COMPOSE_PROJECT}" logs "${COMPOSE_SERVICE}"

      - name: CD - Cleanup
        if: always()
        run: docker compose -p "${COMPOSE_PROJECT}" down --volumes